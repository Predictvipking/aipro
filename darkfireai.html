<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>乂ᴅᴀʀᴋ乡ғɪʀᴇ AI Pro | PREMIUM PWA</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --yellow: #FFD700;
            --blue: #00A3FF;
            --red: #FF3B30;
            --green: #34C759;
            --violet: #AF52DE;
            --text-main: #FFFFFF;
            --text-dim: #8E8E93;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Ubuntu', sans-serif;
        }

        body {
            background-color: #050505; /* OLED Black */
            color: var(--text-main);
            margin: 0;
            padding: env(safe-area-inset-top) 8px env(safe-area-inset-bottom) 8px;
            overflow-x: hidden;
        }

        /* Glass Effect Helper */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
        }

        /* Login Screen */
        #login-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: #000; display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            width: 85%; max-width: 340px; padding: 25px; text-align: center;
        }
        .login-box h1 { font-size: 20px; color: var(--yellow); margin-bottom: 20px; letter-spacing: 2px; }
        .login-input {
            width: 100%; background: #111; border: 1px solid #222; padding: 14px;
            border-radius: 10px; color: #fff; text-align: center; font-size: 16px; margin-bottom: 15px;
        }
        .login-btn {
            width: 100%; background: linear-gradient(45deg, var(--yellow), #FFB000);
            border: none; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer;
        }

        /* Main Dashboard */
        #dashboard { display: none; }

        /* Header */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 5px; margin-bottom: 5px;
        }
        .header-title { font-size: 16px; font-weight: 700; color: var(--yellow); }
        .header-right { display: flex; gap: 12px; align-items: center; }

        /* Stats Row */
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px;
        }
        .stat-card { padding: 8px; text-align: center; }
        .stat-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 3px; }
        .stat-val { font-size: 14px; font-weight: 700; color: var(--green); }

        /* Prediction Card 3x2 */
        .prediction-card {
            padding: 12px; display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-bottom: 8px;
        }
        .p-info { display: flex; flex-direction: column; gap: 8px; }
        .p-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
        .p-val { font-size: 13px; font-weight: 600; }
        .signal-big { font-size: 32px; font-weight: 900; color: var(--yellow); margin-top: -2px; }
        .signal-small { font-size: 32px; font-weight: 900; color: var(--blue); margin-top: -2px; }

        .p-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; }
        .circle-group { display: flex; gap: 8px; }
        .circle {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 700; border: 2px solid rgba(255,255,255,0.1);
        }

        /* Number Colors */
        .c0 { background: linear-gradient(135deg, var(--red) 50%, var(--violet) 50%); }
        .c5 { background: linear-gradient(135deg, var(--green) 50%, var(--violet) 50%); }
        .c-red { background-color: var(--red); }
        .c-green { background-color: var(--green); }

        /* Trend Analysis */
        .trend-box { padding: 8px; margin-bottom: 8px; }
        .trend-dots { display: flex; gap: 5px; overflow-x: auto; padding: 5px 0; }
        .dot { 
            min-width: 22px; height: 22px; border-radius: 4px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 10px; font-weight: 700; color: #000;
        }

        /* Overdue 5x2 */
        .overdue-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 8px; }
        .ov-card { padding: 6px 0; text-align: center; }
        .ov-num { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
        .ov-miss { font-size: 9px; color: var(--text-dim); }

        /* History Table */
        .history-box { overflow: hidden; margin-top: 5px; }
        .h-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .h-table th { padding: 10px 4px; text-align: center; color: var(--text-dim); border-bottom: 1px solid var(--glass-border); }
        .h-table td { padding: 10px 4px; text-align: center; border-bottom: 1px solid var(--glass-border); }

        .pagination { display: flex; justify-content: space-between; align-items: center; padding: 12px; }
        .pg-btn { background: #1a1a1a; border: none; color: #fff; padding: 6px 15px; border-radius: 6px; }

        /* Custom Font Colors */
        .txt-rv { color: var(--red); text-shadow: 0 0 5px var(--violet); }
        .txt-gv { color: var(--green); text-shadow: 0 0 5px var(--violet); }
        .txt-red { color: var(--red); }
        .txt-green { color: var(--green); }
        .win { color: var(--green); font-weight: bold; }
        .loss { color: var(--red); font-weight: bold; }

    </style>
</head>
<body>

    <!-- Login -->
    <div id="login-screen">
        <div class="login-box glass">
            <h1><i class="fas fa-shield-halved"></i> ACCESS</h1>
            <input type="password" id="access-key" class="login-input" placeholder="Enter Access Key">
            <button class="login-btn" onclick="login()">UNLOCK DASHBOARD</button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard">
        <div class="header">
            <div class="header-title"><i class="fas fa-fire-flame-curved"></i> 乂ᴅᴀʀᴋ乡ғɪʀᴇ</div>
            <div class="header-right">
                <span style="font-size: 13px; font-weight: 600;"><i class="far fa-clock"></i> <span id="timer">00:00</span></span>
                <i class="fas fa-power-off" style="color:var(--red); font-size: 16px;" onclick="location.reload()"></i>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card glass">
                <div class="stat-label">Accuracy</div>
                <div class="stat-val">91.4%</div>
            </div>
            <div class="stat-card glass">
                <div class="stat-label">Level</div>
                <div id="level-val" class="stat-val" style="color:var(--yellow)">L1</div>
            </div>
            <div class="stat-card glass">
                <div class="stat-label">Multiplier</div>
                <div id="mult-val" class="stat-val">1x</div>
            </div>
        </div>

        <!-- Prediction Card -->
        <div class="prediction-card glass">
            <div class="p-info">
                <div>
                    <div class="p-label">Period Number</div>
                    <div class="p-val" id="period-num">----------</div>
                </div>
                <div>
                    <div class="p-label">Signal</div>
                    <div id="signal-text" class="signal-big">WAIT</div>
                </div>
            </div>
            <div class="p-right">
                <i class="fas fa-arrows-rotate" style="color:var(--green); font-size:18px;" onclick="refreshData()"></i>
                <div class="circle-group" id="circle-group">
                    <div class="circle c-red">?</div>
                    <div class="circle c-green">?</div>
                </div>
            </div>
        </div>

        <!-- Trend -->
        <div class="section-title" style="font-size:10px; margin: 8px 5px 4px; color:var(--text-dim);">
            <i class="fas fa-chart-line"></i> TREND ANALYSIS
        </div>
        <div class="trend-box glass">
            <div class="trend-dots" id="trend-list"></div>
        </div>

        <!-- Overdue -->
        <div class="section-title" style="font-size:10px; margin: 8px 5px 4px; color:var(--text-dim);">
            <i class="fas fa-hourglass-half"></i> MISSING NUMBERS
        </div>
        <div class="overdue-grid">
            <div id="ov-row-1" style="display:contents"></div>
            <div id="ov-row-2" style="display:contents"></div>
        </div>

        <!-- History -->
        <div class="history-box glass">
            <table class="h-table">
                <thead>
                    <tr>
                        <th>Period</th>
                        <th>Color</th>
                        <th>Size</th>
                        <th>Num</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
            <div class="pagination">
                <button class="pg-btn" onclick="changePage(-1)"><i class="fas fa-angle-left"></i></button>
                <span id="page-info" style="font-size:11px">Page 1/20</span>
                <button class="pg-btn" onclick="changePage(1)"><i class="fas fa-angle-right"></i></button>
            </div>
        </div>
    </div>

<script>
    const KEYS = ["J0el1991$", "ZRX_PAPA_01", "ZRX_PAPA_02", "ZRX_PAPA_03", "ZRX_PAPA_04"];
    let historyData = [];
    let currentPage = 1;
    let mLevel = 1;

    function login() {
        const key = document.getElementById('access-key').value;
        if(KEYS.includes(key)) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            startApp();
        } else { alert("Invalid Key!"); }
    }

    function getNumInfo(n) {
        if (n === 0) return { class: 'c0', label: 'Red|Violet', txt: 'txt-rv' };
        if (n === 5) return { class: 'c5', label: 'Green|Violet', txt: 'txt-gv' };
        if ([1, 3, 7, 9].includes(n)) return { class: 'c-green', label: 'Green', txt: 'txt-green' };
        return { class: 'c-red', label: 'Red', txt: 'txt-red' };
    }

    function startApp() {
        updateClock();
        setInterval(updateClock, 1000);
        initHistory();
        updateOverdue();
        refreshData();
    }

    function updateClock() {
        const now = new Date();
        const sec = now.getSeconds();
        const rem = 60 - sec;
        document.getElementById('timer').innerText = `00:${rem < 10 ? '0'+rem : rem}`;
        
        const yr = now.getFullYear();
        const mt = String(now.getMonth()+1).padStart(2,'0');
        const dy = String(now.getDate()).padStart(2,'0');
        const mins = now.getHours() * 60 + now.getMinutes();
        const pId = `${yr}${mt}${dy}1000${10001 + mins}`;
        document.getElementById('period-num').innerText = pId;

        if(sec === 0) {
            mLevel = Math.random() > 0.8 ? (mLevel < 5 ? mLevel + 1 : 1) : 1;
            document.getElementById('level-val').innerText = `L${mLevel}`;
            document.getElementById('mult-val').innerText = `${Math.pow(3, mLevel-1)}x`;
            refreshData();
        }
    }

    function refreshData() {
        const isBig = Math.random() > 0.5;
        const n1 = isBig ? Math.floor(Math.random()*5)+5 : Math.floor(Math.random()*5);
        const n2 = (n1 + 2) % 10;
        
        const sig = document.getElementById('signal-text');
        sig.innerText = isBig ? "BIG" : "SMALL";
        sig.className = isBig ? "signal-big" : "signal-small";
        
        document.getElementById('circle-group').innerHTML = `
            <div class="circle ${getNumInfo(n1).class}">${n1}</div>
            <div class="circle ${getNumInfo(n2).class}">${n2}</div>
        `;
    }

    function initHistory() {
        const base = 20260516100010590;
        for(let i=0; i<200; i++) {
            const n = Math.floor(Math.random()*10);
            historyData.push({
                p: base - i,
                n: n,
                s: n >= 5 ? "BIG" : "SMALL",
                w: Math.random() > 0.3
            });
        }
        renderHistory();
        renderTrend();
    }

    function renderTrend() {
        const list = document.getElementById('trend-list');
        list.innerHTML = historyData.slice(0, 15).map(h => `
            <div class="dot" style="background:${h.s==='BIG'?'var(--yellow)':'var(--blue)'}">${h.s[0]}</div>
        `).reverse().join('');
    }

    function renderHistory() {
        const start = (currentPage - 1) * 10;
        const items = historyData.slice(start, start + 10);
        document.getElementById('history-body').innerHTML = items.map(h => {
            const info = getNumInfo(h.n);
            return `<tr>
                <td style="color:#666">${h.p}</td>
                <td class="${info.txt}">${info.label}</td>
                <td style="color:${h.s==='BIG'?'var(--yellow)':'var(--blue)'}; font-weight:bold">${h.s}</td>
                <td class="${info.txt}" style="font-weight:bold">${h.n}</td>
                <td class="${h.w?'win':'loss'}">${h.w?'WIN':'LOSS'}</td>
            </tr>`;
        }).join('');
        document.getElementById('page-info').innerText = `Page ${currentPage}/20`;
    }

    function updateOverdue() {
        const r1 = document.getElementById('ov-row-1');
        const r2 = document.getElementById('ov-row-2');
        r1.innerHTML = ''; r2.innerHTML = '';
        for(let i=0; i<10; i++) {
            const html = `<div class="ov-card glass">
                <div class="ov-num ${getNumInfo(i).txt}">${i}</div>
                <div class="ov-miss">Miss ${Math.floor(Math.random()*18)}</div>
            </div>`;
            if(i < 5) r1.innerHTML += html; else r2.innerHTML += html;
        }
    }

    function changePage(d) {
        currentPage += d;
        if(currentPage < 1) currentPage = 1;
        if(currentPage > 20) currentPage = 20;
        renderHistory();
    }
</script>
</body>
</html>
