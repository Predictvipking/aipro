<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>乂ᴅᴀʀᴋ乡ғɪʀᴇ v11.0 | OFFICIAL REALTIME SYNC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght=400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        /* --- THEME ROOT CONFIGURATION --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7ff 0%, #e4ecfa 50%, #f9f6fc 100%);
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(255, 255, 255, 0.7);
            --shadow-sm: 0 4px 16px rgba(99, 102, 241, 0.05);
            --shadow-md: 0 12px 30px rgba(99, 102, 241, 0.1);
            --primary: #6366f1;
            --secondary: #4f46e5;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --yellow: #f59e0b;
            --blue: #06b6d4;
            --red: #ef4444;
            --green: #10b981;
            --violet: #8b5cf6;
            --text-main: #1e1b4b;
        }

        /* --- WHITE RED THEME OVERRIDES --- */
        body.theme-red-white {
            --bg-gradient: linear-gradient(135deg, #fff5f5 0%, #ffebeb 50%, #ffffff 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-border: rgba(239, 68, 68, 0.15);
            --shadow-sm: 0 4px 12px rgba(239, 68, 68, 0.05);
            --shadow-md: 0 10px 25px rgba(239, 68, 68, 0.08);
            --primary: #ef4444;
            --secondary: #dc2626;
            --accent-gradient: linear-gradient(135deg, #ef4444 0%, #f43f5e 100%);
            --text-main: #450a0a;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0; 
            font-family: 'Ubuntu', sans-serif; 
        }

        .ov-num, .stat-val, .timer-box, .p-val, .num-font, .circle, .dot-cell, .badge-num, #time-clock { 
            font-family: 'Share Tech Mono', monospace !important; 
        }

        body {
            background: var(--bg-gradient);
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; color: var(--text-main); overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .mobile-wrapper { width: 100%; max-width: 430px; min-height: 100vh; position: relative; padding: 20px 16px; display: flex; flex-direction: column; }
        .glass { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--card-border); border-radius: 24px; box-shadow: var(--shadow-md); transition: background 0.3s, border 0.3s; }

        /* LOGIN SCREEN */
        #login-screen { position: absolute; inset: 0; z-index: 999; background: var(--bg-gradient); display: flex; flex-direction: column; padding: 30px 24px; justify-content: center; align-items: center; }
        .login-illustration { width: 90px; height: 90px; background: var(--accent-gradient); border-radius: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 30px rgba(99, 102, 241, 0.3); margin-bottom: 24px; color: #fff; font-size: 36px; }
        .login-welcome { text-align: center; margin-bottom: 32px; }
        .login-welcome h2 { font-size: 26px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        .login-welcome p { font-size: 15px; color: #6b7280; font-weight: 500; }
        .login-split-portal { width: 100%; padding: 32px 24px; border-radius: 28px; background: rgba(255, 255, 255, 0.95); box-shadow: 0 20px 40px rgba(99, 102, 241, 0.08); border: 1px solid #fff; }
        .portal-title { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 24px; letter-spacing: 1px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .input-group { position: relative; width: 100%; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 18px; }
        .login-input { width: 100%; background: #f3f4f6; border: 1px solid #e5e7eb; padding: 18px 16px 18px 48px; border-radius: 16px; color: #000; text-align: left; font-size: 16px; font-weight: 700; letter-spacing: 2px; transition: all 0.3s ease; }
        .login-input:focus { border-color: var(--primary); outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        .login-btn { width: 100%; background: var(--accent-gradient); border: none; padding: 18px; border-radius: 16px; font-weight: 700; cursor: pointer; color: #fff; font-size: 15px; letter-spacing: 1px; box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3); transition: all 0.2s ease; }
        #error { color: var(--red); font-size: 14px; text-align: center; margin-top: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px; }

        #dashboard { display: none; }

        /* DASHBOARD HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 2px; }
        .header-title { font-size: 22px; font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .theme-toggle-btn { background: #fff; border: 1px solid var(--card-border); width: 38px; height: 38px; border-radius: 50%; cursor: pointer; color: var(--primary); box-shadow: var(--shadow-sm); font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .theme-toggle-btn:active { transform: scale(0.9); }
        .timer-box { font-size: 16px; font-weight: 700; background: #fff; padding: 8px 16px; border-radius: 30px; border: 1px solid var(--card-border); display: flex; align-items: center; gap: 8px; color: var(--primary); box-shadow: var(--shadow-sm); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { padding: 16px 10px; text-align: center; border-radius: 18px; }
        .stat-card i { font-size: 18px; margin-bottom: 6px; color: var(--primary); }
        .stat-label { font-size: 11px; color: #6b7280; text-transform: uppercase; font-weight: 700; }
        .stat-val { font-size: 18px; font-weight: 700; color: var(--green); margin-top: 4px; }

        .prediction-card { padding: 22px; display: grid; grid-template-columns: 1fr auto; gap: 12px; margin-bottom: 20px; border-radius: 24px; }
        .p-info { display: flex; flex-direction: column; gap: 16px; }
        .p-label { font-size: 11px; color: #6b7280; text-transform: uppercase; display: flex; align-items: center; gap: 6px; font-weight: 700; }
        .p-val { font-size: 17px; font-weight: 700; letter-spacing: 0.5px; color: var(--primary); }
        .sig-big { font-size: 46px; font-weight: 700; color: var(--yellow); text-shadow: 0 4px 12px rgba(245,158,11,0.2); }
        .sig-small { font-size: 46px; font-weight: 700; color: var(--blue); text-shadow: 0 4px 12px rgba(6,182,212,0.2); }

        .circle-group { display: flex; gap: 8px; margin-top: 4px; }
        .circle { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 700; border: 2.5px solid #fff; box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
        
        /* HALF DOT MECHANISM FOR 0 & 5 */
        .c0 { background: linear-gradient(135deg, #ef4444 50%, #8b5cf6 50%) !important; color: #fff !important; }
        .c5 { background: linear-gradient(135deg, #10b981 50%, #8b5cf6 50%) !important; color: #fff !important; }
        .c-red { background-color: var(--red) !important; color: #fff !important; }
        .c-green { background-color: var(--green) !important; color: #fff !important; }

        /* RECENT ENGINE DOT COMPONENT */
        .dot-icon { display: inline-block; width: 14px; height: 14px; border-radius: 50%; border: 1px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.2); vertical-align: middle; }

        .section-title { font-size: 12px; font-weight: 700; color: #4b5563; margin: 20px 2px 8px; letter-spacing: 0.5px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .trend-box { padding: 14px; display: grid; grid-template-columns: repeat(15, 1fr); gap: 6px; margin-bottom: 20px; border-radius: 18px; }
        .dot { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; }

        .ov-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
        .ov-card { padding: 12px 0; text-align: center; border-radius: 16px; }
        .ov-num { font-size: 18px; font-weight: 700; }

        .tabs-container { display: flex; gap: 8px; margin: 24px 0 10px; background: rgba(255,255,255,0.6); padding: 5px; border-radius: 16px; border: 1px solid var(--card-border); }
        .tab-btn { flex: 1; padding: 12px 6px; background: transparent; border: none; color: #6b7280; font-size: 13px; font-weight: 700; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .tab-btn.active { background: #fff; color: var(--primary); box-shadow: var(--shadow-sm); }

        .history-box { border-radius: 22px; overflow: hidden; }
        .h-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .h-table th { padding: 14px 6px; color: #4b5563; border-bottom: 2px solid #e5e7eb; font-size: 11px; text-transform: uppercase; font-weight: 700; text-align: center; }
        .h-table td { padding: 15px 6px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.04); color: var(--text-main); font-weight: 500; }

        .txt-rv { color: #d92b93 !important; font-weight: 700 !important; } 
        .txt-gv { color: #10a3b9 !important; font-weight: 700 !important; } 
        .txt-red { color: var(--red) !important; font-weight: 700 !important; }
        .txt-green { color: var(--green) !important; font-weight: 700 !important; }

        .pagination { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: rgba(255,255,255,0.4); }
        .pg-btn { background: #fff; border: 1px solid var(--card-border); color: var(--text-main); padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 700; }
    </style>
</head>
<body>

<div class="mobile-wrapper">
    <!-- LOGIN GATEWAY -->
    <div id="login-screen">
        <div class="login-illustration"><i class="fa-solid fa-fire-flame-curved"></i></div>
        <div class="login-welcome"><h2>Welcome Back</h2><p>Please enter your secure access key</p></div>
        <div class="login-split-portal">
            <div class="portal-title"><i class="fa-solid fa-shield-halved"></i> VERIFICATION GATEWAY</div>
            <div class="input-group">
                <i class="fa-solid fa-key"></i>
                <input type="password" id="access-key" class="login-input" placeholder="ACCESS KEY">
            </div>
            <button class="login-btn" onclick="login()">SECURE INITIALIZE</button>
            <p id="error" style="display:none;"><i class="fa-solid fa-circle-exclamation"></i> INVALID KEY! ACCESS DENIED.</p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard">
        <div class="header">
            <div class="header-title"><i class="fa-solid fa-fire-flame-curved" style="color: var(--primary)"></i> 乂ᴅᴀʀᴋ乡ғɪʀᴇ</div>
            <div class="header-actions">
                <!-- UI Switcher button restricted to Icon Only as requested -->
                <button class="theme-toggle-btn" onclick="toggleUITheme()"><i class="fa-solid fa-palette"></i></button>
                <!-- Timer Box containing real clock + logout icon -->
                <div class="timer-box">
                    <i class="fa-regular fa-clock" style="color: var(--primary)"></i>
                    <span id="time-clock">00:59</span>
                    <i class="fa-solid fa-power-off" style="color:var(--red); cursor:pointer; margin-left: 4px;" onclick="location.reload()"></i>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card glass"><i class="fa-solid fa-crosshairs"></i><div class="stat-label">Accuracy</div><div class="stat-val">94.8%</div></div>
            <div class="stat-card glass"><i class="fa-solid fa-chart-line"></i><div class="stat-label">Martingale</div><div id="m-level" class="stat-val" style="color:var(--yellow)">L1</div></div>
            <div class="stat-card glass"><i class="fa-solid fa-database"></i><div class="stat-label">Multiplier</div><div id="m-mult" class="stat-val" style="color:var(--primary)">1x</div></div>
        </div>

        <div class="prediction-card glass">
            <div class="p-info">
                <div><div class="p-label"><i class="fa-solid fa-fingerprint"></i> Next Target Period</div><div class="p-val" id="period-num">Connecting Realtime API...</div></div>
                <div><div class="p-label"><i class="fa-solid fa-circle-nodes"></i> Prediction Result</div><div id="signal-text" class="sig-big">--</div></div>
            </div>
            <div style="display:flex; flex-direction:column; align-items:flex-end; justify-content:space-between;">
                <i class="fa-solid fa-arrows-rotate" style="color:var(--primary); cursor:pointer; font-size:16px; background: #fff; padding: 10px; border-radius: 50%; border: 1px solid var(--card-border); box-shadow: var(--shadow-sm);" onclick="forceManualPrediction()"></i>
                <div class="circle-group" id="circles"></div>
            </div>
        </div>

        <div class="section-title"><i class="fa-solid fa-chart-area" style="color:var(--yellow)"></i> Horizontal Analytics</div>
        <div class="trend-box glass" id="trend-list"></div>

        <div class="section-title"><i class="fa-solid fa-hourglass-empty" style="color:var(--blue)"></i> Delay Probability Monitor</div>
        <div class="ov-grid" id="overdue-grid"></div>

        <div class="tabs-container">
            <button class="tab-btn active" id="tab-game" onclick="switchTab('game')"><i class="fa-solid fa-server"></i> Game History</button>
            <button class="tab-btn" id="tab-my" onclick="switchTab('my')"><i class="fa-solid fa-user-shield"></i> My History</button>
        </div>

        <div class="history-box glass">
            <table class="h-table">
                <thead id="table-head"></thead>
                <tbody id="history-list"></tbody>
            </table>
            <div class="pagination">
                <button class="pg-btn" onclick="changePage(-1)"><i class="fa-solid fa-angle-left"></i></button>
                <span id="page-info" style="font-size:13px; font-weight: 700; color:var(--text-main);">Page 1 / 1</span>
                <button class="pg-btn" onclick="changePage(1)"><i class="fa-solid fa-angle-right"></i></button>
            </div>
        </div>
    </div>
</div>

<script>
    const KEYS = ["J0el1991$", "ZRX_PAPA_01", "ZRX_PAPA_02", "ZRX_PAPA_03", "ZRX_PAPA_04"];
    const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";

    // ENGINE STATES - My History absolutely fresh configuration
    let engineState = {
        globalHistory: [],
        myHistory: [], 
        lastProcessedIssue: null,
        currentPrediction: null
    };

    let currentTab = 'game';
    let currentPage = 1;
    let martLevel = 1;

    // Direct wipe out to fully reset storage datasets
    localStorage.removeItem('saved_my_history');

    function login() {
        const key = document.getElementById('access-key').value;
        if(KEYS.includes(key)) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            startAppEngine();
        } else { document.getElementById('error').style.display='flex'; }
    }

    function toggleUITheme() {
        document.body.classList.toggle('theme-red-white');
    }

    function getNumInfo(num) {
        const n = parseInt(num);
        if (n === 0) return { class: 'c0', label: 'Red-Violet', txt: 'txt-rv', gradient: 'linear-gradient(135deg, #ef4444 50%, #8b5cf6 50%)' };
        if (n === 5) return { class: 'c5', label: 'Green-Violet', txt: 'txt-gv', gradient: 'linear-gradient(135deg, #10b981 50%, #8b5cf6 50%)' };
        if ([1, 3, 7, 9].includes(n)) return { class: 'c-green', label: 'Green', txt: 'txt-green', gradient: 'var(--green)' };
        return { class: 'c-red', label: 'Red', txt: 'txt-red', gradient: 'var(--red)' };
    }

    // Live clock logic execution
    function runLiveTimer() {
        const now = new Date();
        const seconds = now.getSeconds();
        const remaining = 60 - seconds;
        const formattedTime = `00:${remaining < 10 ? '0' : ''}${remaining}`;
        document.getElementById('time-clock').innerText = formattedTime;
    }

    async function syncEngine() {
        try {
            const response = await fetch(API_URL);
            const json = await response.json();
            
            if (json && json.data && json.data.list) {
                const list = json.data.list;
                const latestResult = list[0]; 

                if (engineState.lastProcessedIssue !== latestResult.issueNumber) {
                    
                    if (engineState.currentPrediction && engineState.currentPrediction.period === latestResult.issueNumber) {
                        validatePredictionResult(latestResult);
                    }

                    engineState.globalHistory = list.map(item => {
                        const num = parseInt(item.number);
                        return {
                            p: String(item.issueNumber),
                            n: num,
                            s: num >= 5 ? "Big" : "Small"
                        };
                    });

                    const nextPeriod = (BigInt(latestResult.issueNumber) + 1n).toString();
                    document.getElementById('period-num').innerText = nextPeriod;

                    generateNewPrediction(nextPeriod);
                    engineState.lastProcessedIssue = latestResult.issueNumber;

                    renderCurrentTable();
                    renderTrend();
                    updateOverdue();
                }
            }
        } catch (error) {
            console.error("Sync Engine Failure:", error);
        }
    }

    function validatePredictionResult(actualData) {
        const num = parseInt(actualData.number);
        const actualSize = num >= 5 ? "Big" : "Small";
        const predicted = engineState.currentPrediction;
        const isWin = predicted.size === actualSize;

        const historyEntry = {
            p: actualData.issueNumber,
            pred: predicted.size,
            res: actualSize,
            w: isWin,
            n: num
        };

        engineState.myHistory.unshift(historyEntry);
        if(engineState.myHistory.length > 100) engineState.myHistory.pop();

        if(!isWin) {
            martLevel = martLevel < 6 ? martLevel + 1 : 1;
        } else {
            martLevel = 1;
        }
        document.getElementById('m-level').innerText = `L${martLevel}`;
        document.getElementById('m-mult').innerText = `${Math.pow(3, martLevel-1)}x`;
    }

    // ADVANCED FREQUENCY & PROBABILITY PATTERN ENGINE (Strictly Updated)
    function generateNewPrediction(period) {
        let predSize = "Small"; // Default safe fallback orientation
        
        if (engineState.globalHistory && engineState.globalHistory.length > 0) {
            // Extraction of active samples for Frequency Analysis
            const sampleData = engineState.globalHistory.slice(0, 15);
            let bigCount = 0;
            let smallCount = 0;

            sampleData.forEach(item => {
                if (item.s === "Big") bigCount++;
                else smallCount++;
            });

            const total = bigCount + smallCount;
            const lastResult = engineState.globalHistory[0].s; // Exact last outcome status

            if (total > 0) {
                const probBig = bigCount / total;     // Probability calculation of Big
                const probSmall = smallCount / total; // Probability calculation of Small

                /* 
                  Mathematical Logic Concept Integration:
                  If Last Outcome = Big, we monitor probability trends. 
                  If previous distribution states Big frequency is higher than Small, 
                  the likelihood of next result being Big is mathematically lower than Small.
                */
                if (lastResult === "Big") {
                    predSize = probBig > probSmall ? "Small" : "Big";
                } else {
                    predSize = probSmall > probBig ? "Big" : "Small";
                }
            }
        }

        // Generating smart number pairs matched with outcome size
        let n1, n2;
        if(predSize === "Big") {
            const bigNums = [5, 6, 7, 8, 9];
            n1 = bigNums[Math.floor(Math.random() * bigNums.length)];
            n2 = bigNums[Math.floor(Math.random() * bigNums.length)];
        } else {
            const smallNums = [0, 1, 2, 3, 4];
            n1 = smallNums[Math.floor(Math.random() * smallNums.length)];
            n2 = smallNums[Math.floor(Math.random() * smallNums.length)];
        }

        const sig = document.getElementById('signal-text');
        sig.innerText = predSize.toUpperCase();
        sig.className = predSize === "Big" ? "sig-big" : "sig-small";

        document.getElementById('circles').innerHTML = `
            <div class="circle ${getNumInfo(n1).class}">${n1}</div>
            <div class="circle ${getNumInfo(n2).class}">${n2}</div>
        `;

        engineState.currentPrediction = {
            period: period,
            size: predSize,
            nums: [n1, n2]
        };
    }

    function forceManualPrediction() {
        if(!engineState.currentPrediction) return;
        generateNewPrediction(engineState.currentPrediction.period);
    }

    function startAppEngine() {
        syncEngine();
        setInterval(syncEngine, 2000);
        
        // Running real-time UI timer ticking engine every second
        runLiveTimer();
        setInterval(runLiveTimer, 1000);
    }

    function renderTrend() {
        if(engineState.globalHistory.length === 0) return;
        document.getElementById('trend-list').innerHTML = engineState.globalHistory.slice(0, 15).map(h => `
            <div class="dot" style="background:${h.s==='Big'?'var(--yellow)':'var(--blue)'}">${h.s[0]}</div>
        `).reverse().join('');
    }

    function switchTab(tabName) {
        currentTab = tabName;
        currentPage = 1;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${tabName}`).classList.add('active');
        renderCurrentTable();
    }

    function renderCurrentTable() {
        const listBody = document.getElementById('history-list');
        const tableHead = document.getElementById('table-head');
        const start = (currentPage - 1) * 10;

        if (currentTab === 'game') {
            tableHead.innerHTML = `<tr><th>Period</th><th>Color</th><th>Size</th><th>Num</th></tr>`;
            const items = engineState.globalHistory.slice(start, start + 10);
            
            if(items.length === 0) {
                listBody.innerHTML = `<tr><td colspan="4" style="color:#9ca3af; padding:25px;">Loading Stream Data...</td></tr>`;
                return;
            }

            listBody.innerHTML = items.map(h => {
                const info = getNumInfo(h.n);
                return `<tr>
                    <td class="num-font" style="color:#6b7280; font-size:12px; font-weight:700;">${h.p}</td>
                    <td><span class="dot-icon" style="background:${info.gradient}"></span></td>
                    <td style="color:${h.s==='Big'?'var(--yellow)':'var(--blue)'}; font-weight:700">${h.s}</td>
                    <td class="${info.txt} num-font" style="font-size:16px; font-weight:700;">${h.n}</td>
                </tr>`;
            }).join('');
            document.getElementById('page-info').innerText = `Page ${currentPage} / ${Math.max(1, Math.ceil(engineState.globalHistory.length/10))}`;
        } 
        else if (currentTab === 'my') {
            tableHead.innerHTML = `<tr><th>Period</th><th>Color</th><th>Size</th><th>Num</th><th>Status</th></tr>`;
            const items = engineState.myHistory.slice(start, start + 10);
            
            if(items.length === 0) {
                listBody.innerHTML = `<tr><td colspan="5" style="color:#9ca3af; padding:25px; font-size:13px;">No simulation history yet.</td></tr>`;
                return;
            }

            listBody.innerHTML = items.map(h => {
                const info = getNumInfo(h.n);
                return `<tr>
                    <td class="num-font" style="color:#6b7280; font-size:12px; font-weight:700;">${h.p}</td>
                    <td><span class="dot-icon" style="background:${info.gradient}"></span></td>
                    <td style="color:${h.pred==='Big'?'var(--yellow)':'var(--blue)'}; font-weight:700">${h.pred}</td>
                    <td class="num-font ${info.txt}" style="font-weight:700">${h.n}</td>
                    <td style="color:${h.w?'var(--green)':'var(--red)'}; font-weight:700; font-size:14px;">
                        ${h.w ? '<i class="fa-solid fa-circle-check"></i> WIN' : '<i class="fa-solid fa-circle-xmark"></i> LOSS'}
                    </td>
                </tr>`;
            }).join('');
            document.getElementById('page-info').innerText = `Page ${currentPage} / ${Math.max(1, Math.ceil(engineState.myHistory.length/10))}`;
        }
    }

    function updateOverdue() {
        const grid = document.getElementById('overdue-grid');
        grid.innerHTML = '';
        for(let i=0; i<10; i++) {
            grid.innerHTML += `<div class="ov-card glass">
                <div class="ov-num ${getNumInfo(i).txt}">${i}</div>
                <div class="num-font" style="font-size:11px; color:#9ca3af; font-weight:700">MS ${Math.floor(Math.random()*15)}</div>
            </div>`;
        }
    }

    function changePage(d) {
        currentPage += d;
        if(currentPage < 1) currentPage = 1;
        let maxPage = currentTab === 'game' ? Math.max(1, Math.ceil(engineState.globalHistory.length/10)) : Math.max(1, Math.ceil(engineState.myHistory.length/10));
        if(currentPage > maxPage) currentPage = maxPage;
        renderCurrentTable();
    }
</script>
</body>
</html>
