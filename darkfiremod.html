<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乂ᴅᴀʀᴋ乡ғɪʀᴇ | MARTINGALE PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #080a0e;
            --card: #12161d;
            --yellow: #ffcc00; /* Big */
            --blue: #0099ff;   /* Small */
            --red: #ff3333;
            --green: #00e676;
            --violet: #9c27b0;
            --text: #ffffff;
            --border: #232a35;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 5px;
            font-size: 12px;
        }

        .container { width: 100%; max-width: 450px; margin: 0 auto; }

        /* Compact Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--card);
            border-radius: 8px;
            border-bottom: 2px solid var(--yellow);
            margin-bottom: 5px;
        }

        .title { font-weight: 900; color: var(--yellow); font-size: 14px; }

        /* Stats Row */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-bottom: 5px;
        }
        .stat-card {
            background: var(--card);
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
        .stat-val { font-weight: bold; font-size: 14px; color: var(--green); }
        .martingale-active { color: #ff5722; animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.5; } }

        /* Main Prediction Card */
        .main-card {
            background: var(--card);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-bottom: 5px;
            border: 1px solid var(--border);
            position: relative;
        }

        .period-txt { font-size: 13px; color: #aaa; margin-bottom: 5px; letter-spacing: 1px; }

        .signal-txt {
            font-size: 38px;
            font-weight: 900;
            margin: 5px 0;
            text-transform: uppercase;
        }
        .big-ui { color: var(--yellow); text-shadow: 0 0 10px rgba(255,204,0,0.3); }
        .small-ui { color: var(--blue); text-shadow: 0 0 10px rgba(0,153,255,0.3); }

        /* Number Circle Styling */
        .circle-row { display: flex; justify-content: center; gap: 10px; margin: 10px 0; }
        .circle {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold; color: #fff;
            border: 2px solid rgba(255,255,255,0.1);
        }

        /* Color Logic */
        .c0 { background: linear-gradient(135deg, var(--red) 50%, var(--violet) 50%); }
        .c5 { background: linear-gradient(135deg, var(--green) 50%, var(--violet) 50%); }
        .c-red { background-color: var(--red); }
        .c-green { background-color: var(--green); }

        /* Section Titles */
        .section-title {
            padding: 4px 5px; font-size: 10px; color: #666;
            display: flex; align-items: center; gap: 5px;
        }

        /* Trend */
        .trend-box {
            background: var(--card); border-radius: 8px; padding: 8px;
            display: flex; gap: 4px; overflow-x: auto; margin-bottom: 5px;
        }
        .dot {
            min-width: 22px; height: 22px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 10px; color: #000;
        }

        /* Overdue */
        .overdue-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 5px;
        }
        .ov-card {
            background: var(--card); padding: 6px; border-radius: 6px; text-align: center;
            border: 1px solid var(--border);
        }
        .ov-n { font-weight: bold; font-size: 13px; margin-bottom: 2px; }
        .ov-i { font-size: 9px; color: var(--yellow); }

        /* History Table */
        .history-container { background: var(--card); border-radius: 8px; overflow: hidden; }
        .h-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .h-table th { background: #1a1f26; padding: 8px 4px; color: #888; }
        .h-table td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #1a1f26; }

        .btn-refresh {
            width: 100%; padding: 12px; background: linear-gradient(45deg, #1d976c, #93f9b9);
            border: none; border-radius: 8px; color: #000; font-weight: bold;
            margin-top: 5px; cursor: pointer;
        }

        .win-txt { color: var(--green); font-weight: bold; }
        .loss-txt { color: var(--red); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span class="title"><i class="fas fa-fire"></i> 乂ᴅᴀʀᴋ乡ғɪʀᴇ MOD</span>
        <span id="timer" style="font-weight: bold; color: var(--yellow);">00:00</span>
    </div>

    <!-- Martingale & Accuracy Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Accuracy</div>
            <div id="accuracy" class="stat-val">0%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Level</div>
            <div id="m-level" class="stat-val">1</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Multiplier</div>
            <div id="m-mult" class="stat-val">1x</div>
        </div>
    </div>

    <!-- Main Prediction -->
    <div class="main-card">
        <div class="period-txt">PERIOD: <span id="period-display" style="color:#fff">LOADING...</span></div>
        <div id="signal-display" class="signal-txt">--</div>
        <div class="circle-row" id="circle-display">
            <div class="circle" style="background:#222">?</div>
            <div class="circle" style="background:#222">?</div>
        </div>
        <div id="suggestion" style="font-size: 11px; color: #888;">AI ANALYZING TRENDS...</div>
    </div>

    <!-- Pattern Trend -->
    <div class="section-title"><i class="fas fa-chart-line"></i> PATTERN TREND (B/S)</div>
    <div class="trend-box" id="trend-list"></div>

    <!-- Overdue -->
    <div class="section-title"><i class="fas fa-clock"></i> MISSING / OVERDUE</div>
    <div class="overdue-grid" id="overdue-list"></div>

    <!-- History -->
    <div class="section-title"><i class="fas fa-history"></i> RECENT HISTORY</div>
    <div class="history-container">
        <table class="h-table">
            <thead>
                <tr>
                    <th>Period (Full)</th>
                    <th>Color</th>
                    <th>Size</th>
                    <th>Num</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="history-list"></tbody>
        </table>
    </div>

    <button class="btn-refresh" onclick="fetchData()">
        <i class="fas fa-sync-alt"></i> REFRESH DATA
    </button>
</div>

<script>
    let historyData = [];
    let wins = 0;
    let total = 0;
    let currentLevel = 1;
    const multipliers = [1, 3, 9, 27, 81, 243, 729, 2187];

    function getNumInfo(n) {
        if (n === 0) return { class: 'c0', colorLabel: '<span style="color:var(--red)">R</span>|<span style="color:var(--violet)">V</span>' };
        if (n === 5) return { class: 'c5', colorLabel: '<span style="color:var(--green)">G</span>|<span style="color:var(--violet)">V</span>' };
        if ([1, 3, 7, 9].includes(n)) return { class: 'c-green', colorLabel: '<span style="color:var(--green)">Green</span>' };
        return { class: 'c-red', colorLabel: '<span style="color:var(--red)">Red</span>' };
    }

    function updateTimer() {
        const now = new Date();
        const sec = now.getSeconds();
        const rem = 60 - sec;
        document.getElementById('timer').innerText = `00:${rem < 10 ? '0' + rem : rem}`;
        
        // Period calculation
        const yr = now.getFullYear();
        const mt = String(now.getMonth()+1).padStart(2,'0');
        const dy = String(now.getDate()).padStart(2,'0');
        const mins = now.getHours() * 60 + now.getMinutes();
        const pId = `${yr}${mt}${dy}1000${10001 + mins}`;
        
        document.getElementById('period-display').innerText = pId;

        if (sec === 0 || historyData.length === 0) fetchData();
    }

    function fetchData() {
        const pId = document.getElementById('period-display').innerText;
        if(pId === "LOADING...") return;

        // Prediction Logic
        const lastDigit = parseInt(pId.slice(-1));
        const isBig = (lastDigit * 7 + 3) % 10 >= 5;
        const size = isBig ? "BIG" : "SMALL";
        const n1 = isBig ? Math.floor(Math.random()*5)+5 : Math.floor(Math.random()*5);
        const n2 = (n1 + 2) % 10;

        // UI Update
        const sig = document.getElementById('signal-display');
        sig.innerText = size;
        sig.className = `signal-txt ${size.toLowerCase()}-ui`;

        document.getElementById('circle-display').innerHTML = `
            <div class="circle ${getNumInfo(n1).class}">${n1}</div>
            <div class="circle ${getNumInfo(n2).class}">${n2}</div>
        `;

        // Mock result for history
        processHistory(pId, size, n1);
    }

    function processHistory(pId, predSize, predNum) {
        if(historyData.length > 0 && historyData[0].period === pId) return;

        const isWin = Math.random() > 0.4; // Simulation
        const actualSize = isWin ? predSize : (predSize === "BIG" ? "SMALL" : "BIG");

        if(isWin) {
            wins++;
            currentLevel = 1; // Reset Martingale on Win
        } else {
            currentLevel = currentLevel < 8 ? currentLevel + 1 : 1; // Increase on Loss
        }
        total++;

        historyData.unshift({
            period: pId,
            size: actualSize,
            num: predNum,
            isWin: isWin
        });

        if(historyData.length > 10) historyData.pop();
        updateUI();
    }

    function updateUI() {
        // Stats
        document.getElementById('accuracy').innerText = total > 0 ? Math.round((wins/total)*100) + "%" : "0%";
        document.getElementById('m-level').innerText = currentLevel;
        document.getElementById('m-level').className = `stat-val ${currentLevel > 1 ? 'martingale-active' : ''}`;
        document.getElementById('m-mult').innerText = multipliers[currentLevel-1] + "x";

        // History Table
        document.getElementById('history-list').innerHTML = historyData.map(h => `
            <tr>
                <td style="color:#888">${h.period}</td>
                <td>${getNumInfo(h.num).colorLabel}</td>
                <td style="color:${h.size==='BIG'?'var(--yellow)':'var(--blue)'}">${h.size}</td>
                <td>${h.num}</td>
                <td class="${h.isWin?'win-txt':'loss-txt'}">${h.isWin?'WIN':'LOSS'}</td>
            </tr>
        `).join('');

        // Trend Dots
        document.getElementById('trend-list').innerHTML = historyData.map(h => `
            <div class="dot" style="background:${h.size==='BIG'?'var(--yellow)':'var(--blue)'}">${h.size[0]}</div>
        `).reverse().join('');

        // Overdue
        const ov = document.getElementById('overdue-list');
        ov.innerHTML = '';
        for(let i=0; i<10; i++) {
            ov.innerHTML += `
                <div class="ov-card">
                    <div class="ov-n ${getNumInfo(i).class.replace('c-', 'text-')}" style="color:${[1,3,7,9].includes(i)?'var(--green)': (i===0||i===5?'var(--violet)':'var(--red)')}">${i}</div>
                    <div class="ov-i"><i class="fas fa-arrow-up"></i> ${Math.floor(Math.random()*15)}</div>
                </div>
            `;
        }
        
        document.getElementById('suggestion').innerHTML = `SUGGESTED BET: <span style="color:var(--yellow)">${multipliers[currentLevel-1]}x UNIT</span>`;
    }

    setInterval(updateTimer, 1000);
    updateTimer();
</script>
</body>
</html>
